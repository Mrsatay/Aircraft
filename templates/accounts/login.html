{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aircraft Fault Management System - Login</title>
    <link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'vendor/font-awesome/css/all.min.css' %}">
    <style>
        :root {
            --primary-dark: #1a3263;
            --primary-blue: #2c5282;
            --light-blue: #4a90e2;
            --sky-blue: #63b3ed;
            --white: #ffffff;
            --gray-light: #f7fafc;
            --gray-medium: #e2e8f0;
            --gray-dark: #2d3748;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 50%, var(--light-blue) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: float 20s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-25px, -25px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-container {
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 500px;
            padding: 48px;
            position: relative;
            z-index: 1;
            animation: slideIn 0.6s ease-out;
        }
        .logo-section { text-align: center; margin-bottom: 30px; }
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-blue), var(--light-blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: var(--white);
            font-size: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .logo-text { font-size: 24px; font-weight: 600; color: var(--primary-dark); margin-bottom: 8px; }
        .logo-subtitle { color: var(--gray-dark); font-size: 14px; }
        .form-floating { margin-bottom: 20px; }
        .form-control {
            border: 2px solid var(--gray-medium);
            border-radius: 12px;
            height: 52px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: var(--gray-light);
            padding-left: 16px;
            padding-right: 16px;
        }
        .form-control:focus {
            border-color: var(--light-blue);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
            background: var(--white);
        }
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-dark);
            cursor: pointer;
            z-index: 5;
        }
        .btn-login {
            background: linear-gradient(135deg, var(--primary-blue), var(--light-blue));
            border: none;
            border-radius: 12px;
            height: 48px;
            font-weight: 600;
            font-size: 16px;
            color: var(--white);
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(44, 62, 80, 0.25);
            background: linear-gradient(135deg, var(--primary-blue), var(--sky-blue));
        }
        .alert-custom { border-radius: 12px; border: none; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08); }
        .footer { text-align: center; color: var(--white); font-size: 12px; margin-top: 30px; }
        @media (max-width: 480px) {
            .login-container { margin: 10px; padding: 30px 20px; }
            .logo-text { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div>
        <div class="login-container">
            <div class="logo-section">
                <div class="logo-icon"><i class="fas fa-plane"></i></div>
                <h1 class="logo-text">Aircraft FMS</h1>
                <p class="logo-subtitle">Fault Management System</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-custom alert-dismissible fade show mb-3" role="alert">
                    <i class="fas {% if message.tags == 'error' %}fa-exclamation-triangle{% else %}fa-check-circle{% endif %} me-2"></i>
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            {% endif %}

            <form method="post" id="loginForm" novalidate>
                {% csrf_token %}
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
                    <label for="username">Username</label>
                </div>
                <div class="form-floating mb-3 position-relative">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                    <label for="password">Password</label>
                    <span class="password-toggle" id="passwordToggle"><i class="fas fa-eye" id="toggleIcon"></i></span>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="rememberMe" name="remember_me">
                    <label class="form-check-label" for="rememberMe">Remember me for 30 days</label>
                </div>
                <button type="submit" class="btn btn-login" id="loginBtn">
                    <span class="spinner-border spinner-border-sm d-none me-2" id="loginSpinner" role="status"></span>
                    <span id="btnText">Login</span>
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0">Need an account? <a href="{% url 'accounts:register' %}">Register here</a></p>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2026 Aircraft Fault Management System</p>
        </div>
    </div>
    <script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <script>
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const toggleIcon = document.getElementById('toggleIcon');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginSpinner = document.getElementById('loginSpinner');
        const btnText = document.getElementById('btnText');

        passwordToggle?.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleIcon.classList.toggle('fa-eye', !isPassword);
            toggleIcon.classList.toggle('fa-eye-slash', isPassword);
        });

        loginForm?.addEventListener('submit', (event) => {
            if (!loginForm.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
                loginForm.classList.add('was-validated');
                return;
            }
            loginBtn.disabled = true;
            loginSpinner.classList.remove('d-none');
            btnText.textContent = 'Signing in...';
        });

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('username')?.focus();
        });
    </script>
</body>
</html>
